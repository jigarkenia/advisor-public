<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Labour Law Glossary — 220+ Terms from India's 4 Labour Codes | Labour Codes Advisor</title>
  <meta name="description" content="Free glossary of legal terms defined under India's 4 New Labour Codes — Wages, Industrial Relations, Social Security, and OSH. Searchable, with exact section references." />
  <meta name="keywords" content="labour law glossary, labour codes definitions, code on wages definitions, industrial relations code glossary, social security code definitions, OSH code definitions" />
  <meta name="author" content="Labour Codes Advisor" />
  <link rel="canonical" href="https://labourcodesadvisor.com/glossary/" />
  <meta property="og:title" content="Labour Law Glossary — 220+ Terms from India's 4 Labour Codes" />
  <meta property="og:description" content="Searchable glossary of legal terms defined under India's 4 New Labour Codes, with exact section references." />
  <meta property="og:url" content="https://labourcodesadvisor.com/glossary/" />
  <meta property="og:type" content="website" />
  <meta name="theme-color" content="#1a2e1a" />
  <link rel="stylesheet" href="/assets/css/main.css" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "DefinedTermSet",
    "name": "Labour Law Glossary — Labour Codes Advisor",
    "description": "A glossary of legal terms as defined under Section 2 of India's 4 New Labour Codes: the Code on Wages 2019, the Industrial Relations Code 2020, the Code on Social Security 2020, and the Occupational Safety, Health and Working Conditions Code 2020.",
    "url": "https://labourcodesadvisor.com/glossary/",
    "publisher": {
      "@type": "Organization",
      "name": "Labour Codes Advisor",
      "url": "https://labourcodesadvisor.com/"
    },
    "isAccessibleForFree": true
  }
  </script>

  <style>
    .glossary-toolbar {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin: 32px 0 28px;
    }

    .search-box {
      width: 100%;
      max-width: 480px;
      padding: 11px 16px;
      border: 1.5px solid var(--paper2);
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--ink);
      background: var(--white);
    }
    .search-box:focus { outline: none; border-color: var(--leaf2); }

    .view-tabs { display: flex; gap: 8px; }
    .view-tab {
      padding: 8px 18px;
      border: 1.5px solid var(--paper2);
      border-radius: 999px;
      background: var(--white);
      font-size: 13px;
      font-weight: 500;
      color: var(--ink2);
      cursor: pointer;
    }
    .view-tab.active { background: var(--leaf); color: var(--white); border-color: var(--leaf); }

    .code-nav { display: flex; flex-wrap: wrap; gap: 8px; }
    .code-btn {
      padding: 7px 16px;
      background: var(--white);
      border: 1px solid var(--paper2);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink2);
      cursor: pointer;
      text-decoration: none;
    }
    .code-btn:hover, .code-btn.active { background: var(--leaf); color: var(--white); border-color: var(--leaf); }

    .code-group { margin-bottom: 28px; }
    .code-heading {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--leaf);
      border-bottom: 2px solid var(--paper2);
      padding-bottom: 6px;
      margin-bottom: 14px;
    }

    .az-nav { display: flex; flex-wrap: wrap; gap: 6px; }
    .az-btn {
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      background: var(--white);
      border: 1px solid var(--paper2);
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      color: var(--ink2);
      cursor: pointer;
      text-decoration: none;
    }
    .az-btn:hover, .az-btn.active { background: var(--leaf); color: var(--white); border-color: var(--leaf); }
    .az-btn.disabled { opacity: 0.3; cursor: default; pointer-events: none; }

    .result-count { font-size: 13px; color: var(--ink3); margin-bottom: 8px; }

    .glossary-list { margin-bottom: 56px; }

    .letter-group { margin-bottom: 28px; }
    .letter-heading {
      font-family: 'DM Serif Display', serif;
      font-size: 24px;
      color: var(--leaf);
      border-bottom: 2px solid var(--paper2);
      padding-bottom: 6px;
      margin-bottom: 14px;
    }

    .term-entry {
      padding: 14px 0;
      border-bottom: 1px solid var(--paper2);
    }
    .term-entry h3 { font-size: 15px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
    .term-entry p { font-size: 14px; color: var(--ink2); margin-bottom: 6px; line-height: 1.6; }
    .term-source {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: var(--leaf);
      background: rgba(45, 90, 39, 0.08);
      border-radius: 999px;
      padding: 2px 10px;
    }

    .no-results { text-align: center; color: var(--ink3); font-size: 14px; padding: 40px 0; }
  </style>
</head>
<body>

  <header id="site-header"></header>

  <main>
    <div class="container">

      <div class="page-hero">
        <p class="eyebrow">Free Resource · 220+ Terms</p>
        <h1>Labour Law Glossary</h1>
        <p>Plain definitions of every term defined under Section 2 of India's 4 New Labour Codes — the Code on Wages, Industrial Relations Code, Code on Social Security, and OSH Code. Free to search, no login required.</p>
      </div>

      <div class="glossary-toolbar">
        <input type="text" id="search-box" class="search-box" placeholder="Search a term, e.g. 'worker', 'wages', 'establishment'…" />

        <div class="view-tabs" id="view-tabs">
          <button class="view-tab active" data-view="alpha">A–Z</button>
          <button class="view-tab" data-view="code">By Code</button>
        </div>

        <div class="az-nav" id="az-nav"></div>
        <div class="code-nav" id="code-nav" style="display: none;"></div>
      </div>

      <p class="result-count" id="result-count"></p>

      <div id="glossary-list" class="glossary-list">
        <div class="no-results">Loading glossary…</div>
      </div>

    </div>
  </main>

  <footer id="site-footer"></footer>

  <script src="/assets/js/layout.js"></script>
  <script>
    let ALL_TERMS = [];
    let CURRENT_VIEW = 'alpha';

    const CODE_ORDER = [
      'Code on Wages, 2019',
      'Industrial Relations Code, 2020',
      'Code on Social Security, 2020',
      'OSH & Working Conditions Code, 2020'
    ];

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function termEntryHtml(t) {
      return (
        '<div class="term-entry" id="' + t.id + '">' +
          '<h3>' + escapeHtml(t.term) + '</h3>' +
          '<p>' + escapeHtml(t.definition) + '.</p>' +
          '<span class="term-source">' + escapeHtml(t.source) + ', ' + escapeHtml(t.section) + '</span>' +
        '</div>'
      );
    }

    function renderAZNav(activeLetter) {
      const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
      const availableLetters = new Set(ALL_TERMS.map(t => t.term[0].toUpperCase()));
      const nav = document.getElementById('az-nav');
      nav.innerHTML = letters.map(function (letter) {
        const has = availableLetters.has(letter);
        const cls = 'az-btn' + (has ? '' : ' disabled') + (letter === activeLetter ? ' active' : '');
        return '<a href="#" class="' + cls + '" data-letter="' + letter + '">' + letter + '</a>';
      }).join('');

      nav.querySelectorAll('.az-btn:not(.disabled)').forEach(function (btn) {
        btn.addEventListener('click', function (e) {
          e.preventDefault();
          document.getElementById('search-box').value = '';
          renderAlphaList('', btn.getAttribute('data-letter'));
        });
      });
    }

    function renderCodeNav(activeCode) {
      const nav = document.getElementById('code-nav');
      const presentCodes = CODE_ORDER.filter(c => ALL_TERMS.some(t => t.source === c));
      nav.innerHTML = presentCodes.map(function (code) {
        const cls = 'code-btn' + (code === activeCode ? ' active' : '');
        return '<a href="#" class="' + cls + '" data-code="' + escapeHtml(code) + '">' + escapeHtml(code) + '</a>';
      }).join('');

      nav.querySelectorAll('.code-btn').forEach(function (btn) {
        btn.addEventListener('click', function (e) {
          e.preventDefault();
          document.getElementById('search-box').value = '';
          renderCodeList('', btn.getAttribute('data-code'));
        });
      });
    }

    function renderAlphaList(query, jumpLetter) {
      const listEl = document.getElementById('glossary-list');
      const countEl = document.getElementById('result-count');
      const q = query.trim().toLowerCase();

      let filtered = ALL_TERMS;
      if (q) {
        filtered = ALL_TERMS.filter(function (t) {
          return t.term.toLowerCase().includes(q) || t.definition.toLowerCase().includes(q);
        });
      }

      if (filtered.length === 0) {
        listEl.innerHTML = '<div class="no-results">No terms found. Try a different search.</div>';
        countEl.textContent = '';
        return;
      }

      countEl.textContent = q ? (filtered.length + ' term(s) found') : (filtered.length + ' total terms');

      const groups = {};
      filtered.forEach(function (t) {
        const letter = t.term[0].toUpperCase();
        if (!groups[letter]) groups[letter] = [];
        groups[letter].push(t);
      });

      const sortedLetters = Object.keys(groups).sort();

      listEl.innerHTML = sortedLetters.map(function (letter) {
        const items = groups[letter].map(termEntryHtml).join('');
        return (
          '<div class="letter-group" id="letter-' + letter + '">' +
            '<h2 class="letter-heading">' + letter + '</h2>' +
            items +
          '</div>'
        );
      }).join('');

      renderAZNav(jumpLetter || null);

      if (jumpLetter) {
        const target = document.getElementById('letter-' + jumpLetter);
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    function renderCodeList(query, jumpCode) {
      const listEl = document.getElementById('glossary-list');
      const countEl = document.getElementById('result-count');
      const q = query.trim().toLowerCase();

      let filtered = ALL_TERMS;
      if (q) {
        filtered = ALL_TERMS.filter(function (t) {
          return t.term.toLowerCase().includes(q) || t.definition.toLowerCase().includes(q);
        });
      }

      if (filtered.length === 0) {
        listEl.innerHTML = '<div class="no-results">No terms found. Try a different search.</div>';
        countEl.textContent = '';
        return;
      }

      countEl.textContent = q ? (filtered.length + ' term(s) found') : (filtered.length + ' total terms');

      const groups = {};
      filtered.forEach(function (t) {
        if (!groups[t.source]) groups[t.source] = [];
        groups[t.source].push(t);
      });

      const presentCodes = CODE_ORDER.filter(c => groups[c]);

      listEl.innerHTML = presentCodes.map(function (code) {
        const items = groups[code]
          .sort((a, b) => a.term.localeCompare(b.term))
          .map(termEntryHtml)
          .join('');
        const safeId = code.replace(/[^a-zA-Z0-9]/g, '-');
        return (
          '<div class="code-group" id="code-' + safeId + '">' +
            '<h2 class="code-heading">' + escapeHtml(code) + ' <span style="font-size:13px;color:var(--ink3);font-family:Inter,sans-serif;">(' + groups[code].length + ' terms)</span></h2>' +
            items +
          '</div>'
        );
      }).join('');

      renderCodeNav(jumpCode || null);

      if (jumpCode) {
        const safeId = jumpCode.replace(/[^a-zA-Z0-9]/g, '-');
        const target = document.getElementById('code-' + safeId);
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    function renderCurrentView(query) {
      if (CURRENT_VIEW === 'alpha') {
        renderAlphaList(query || '');
      } else {
        renderCodeList(query || '');
      }
    }

    document.getElementById('view-tabs').addEventListener('click', function (e) {
      const btn = e.target.closest('.view-tab');
      if (!btn) return;
      document.querySelectorAll('.view-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      CURRENT_VIEW = btn.getAttribute('data-view');
      document.getElementById('az-nav').style.display = CURRENT_VIEW === 'alpha' ? 'flex' : 'none';
      document.getElementById('code-nav').style.display = CURRENT_VIEW === 'code' ? 'flex' : 'none';
      document.getElementById('search-box').value = '';
      renderCurrentView('');
    });

    async function loadGlossary() {
      try {
        const res = await fetch('/glossary/data/glossary.json');
        ALL_TERMS = await res.json();
        renderCurrentView('');
      } catch (err) {
        document.getElementById('glossary-list').innerHTML = '<div class="no-results">Could not load the glossary right now.</div>';
      }
    }

    document.getElementById('search-box').addEventListener('input', function (e) {
      renderCurrentView(e.target.value);
    });

    loadGlossary();
  </script>

</body>
</html>
