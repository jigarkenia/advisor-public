<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">Holiday Calendar 2026 | Labour Codes Advisor</title>
  <meta id="page-description" name="description" content="State-wise government holiday calendar 2026 for India." />
  <link id="page-canonical" rel="canonical" href="https://labourcodesadvisor.com/library/holiday-calendar/" />
  <meta name="theme-color" content="#1a2e1a" />
  <link rel="stylesheet" href="/assets/css/main.css" />

  <style>
    .state-meta { text-align: center; font-size: 14px; color: var(--ink3); margin-top: 8px; }

    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin: 28px 0; }
    .filter-btn {
      padding: 7px 16px;
      background: var(--white);
      border: 1px solid var(--paper2);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink2);
      cursor: pointer;
    }
    .filter-btn.active { background: var(--leaf); color: var(--white); border-color: var(--leaf); }

    .holiday-table-wrap {
      background: var(--white);
      border: 1px solid var(--paper2);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 40px;
    }
    table.holiday-table { width: 100%; border-collapse: collapse; }
    table.holiday-table th {
      background: var(--paper2);
      color: var(--leaf);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 12px 16px;
      text-align: left;
    }
    table.holiday-table td { padding: 12px 16px; font-size: 14px; color: var(--ink2); border-bottom: 1px solid var(--paper2); }
    table.holiday-table tr:last-child td { border-bottom: none; }
    table.holiday-table tr.national-row { background: rgba(200, 146, 42, 0.06); }

    .type-badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .type-national { background: rgba(200, 146, 42, 0.15); color: #8a6118; }
    .type-regional { background: rgba(45, 90, 39, 0.1); color: var(--leaf); }
    .type-restricted { background: rgba(150, 150, 150, 0.15); color: var(--ink3); }

    .state-not-found { text-align: center; padding: 60px 20px; color: var(--ink3); }
    .state-not-found a { color: var(--leaf); font-weight: 600; }

    .faq-item { border-bottom: 1px solid var(--paper2); padding: 16px 0; max-width: 680px; margin: 0 auto; }
    .faq-item h3 { font-size: 15px; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
    .faq-item p { font-size: 14px; color: var(--ink2); margin: 0; }

    .disclaimer-box {
      background: rgba(200, 146, 42, 0.08);
      border: 1px solid rgba(200, 146, 42, 0.25);
      border-radius: var(--radius);
      padding: 14px 18px;
      font-size: 13px;
      color: var(--ink2);
      margin: 24px auto 40px;
      max-width: 680px;
    }
  </style>
</head>
<body>

  <header id="site-header"></header>

  <main>
    <div class="container">
      <div id="library-content">
      <div id="page-content">
        <div class="page-hero">
          <p class="eyebrow">Library · Holiday Calendar 2026</p>
          <h1 id="state-heading">Loading Data...</h1>
          <p id="state-subtext"></p>
        </div>
      </div>
      </div>
    </div>
  </main>

  <footer id="site-footer"></footer>

  <script src="/assets/js/layout.js"></script>
  <script>
    function getStateSlugFromPath() {
      // 1. Check for URL parameter first (Great for local testing!)
      // Example: http://localhost:5500/library/holiday-calendar/state-template.html?state=maharashtra
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.has('state')) {
        return urlParams.get('state').toLowerCase();
      }

      // 2. Fallback to Cloudflare Pages routing logic
      // Example: https://labourcodesadvisor.com/library/holiday-calendar/maharashtra/
      const parts = window.location.pathname.split('/').filter(Boolean);
      const idx = parts.indexOf('holiday-calendar');
      
      if (idx !== -1 && parts.length > idx + 1) {
        let slug = parts[idx + 1].toLowerCase();
        // Prevent matching the template filename itself if opened directly
        if (slug.includes('.html')) return null; 
        return slug;
      }
      return null;
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function typeBadgeClass(type) {
      const t = type.toLowerCase();
      if (t.includes('national')) return 'type-national';
      if (t.includes('restricted') || t.includes('optional')) return 'type-restricted';
      return 'type-regional';
    }

    function renderTable(holidays, filterType) {
      const filtered = filterType === 'all' ? holidays : holidays.filter(h => h.type.toLowerCase().includes(filterType));
      
      if (filtered.length === 0) {
          return '<p style="text-align:center; padding: 20px; color: var(--ink3);">No holidays found in this category.</p>';
      }

      const rows = filtered.map(function (h) {
        const rowClass = h.type.toLowerCase().includes('national') ? ' class="national-row"' : '';
        return (
          '<tr' + rowClass + '>' +
            '<td>' + escapeHtml(h.date) + '</td>' +
            '<td>' + escapeHtml(h.day) + '</td>' +
            '<td>' + escapeHtml(h.name) + '</td>' +
            '<td><span class="type-badge ' + typeBadgeClass(h.type) + '">' + escapeHtml(h.type) + '</span></td>' +
          '</tr>'
        );
      }).join('');

      return (
        '<div class="holiday-table-wrap">' +
          '<table class="holiday-table">' +
            '<thead><tr><th>Date</th><th>Day</th><th>Holiday</th><th>Type</th></tr></thead>' +
            '<tbody>' + rows + '</tbody>' +
          '</table>' +
        '</div>'
      );
    }

    function injectStateSchema(stateData, canonicalUrl) {
      const tableSchema = document.createElement('script');
      tableSchema.type = 'application/ld+json';
      tableSchema.text = JSON.stringify({
        '@context': 'https://schema.org',
        '@type': 'Table',
        about: stateData.state + ' Government Holiday List 2026',
        description: 'Official list of public, regional, and restricted holidays declared for ' + stateData.state + ' in 2026.',
        url: canonicalUrl
      });
      document.head.appendChild(tableSchema);

      const faqSchema = document.createElement('script');
      faqSchema.type = 'application/ld+json';
      faqSchema.text = JSON.stringify({
        '@context': 'https://schema.org',
        '@type': 'FAQPage',
        mainEntity: [
          {
            '@type': 'Question',
            name: 'How many official holidays does ' + stateData.state + ' have in 2026?',
            acceptedAnswer: {
              '@type': 'Answer',
              text: stateData.state + ' has ' + stateData.holidayCount + ' listed holidays for 2026, including national, regional, and restricted (optional) holidays as notified by the state government.'
            }
          },
          {
            '@type': 'Question',
            name: 'Is this holiday calendar free to access?',
            acceptedAnswer: {
              '@type': 'Answer',
              text: 'Yes. Labour Codes Advisor provides this ' + stateData.state + ' holiday calendar free of charge, with no login or signup required.'
            }
          },
          {
            '@type': 'Question',
            name: 'What is the difference between national, regional, and restricted holidays?',
            acceptedAnswer: {
              '@type': 'Answer',
              text: 'National holidays (such as Republic Day and Independence Day) are observed across India. Regional holidays are specific to a state and typically mandatory for establishments in that state. Restricted or optional holidays allow employees to choose a limited number from a list, as per company policy.'
            }
          }
        ]
      });
      document.head.appendChild(faqSchema);
    }

    async function init() {
      const slug = getStateSlugFromPath();
      const contentEl = document.getElementById('page-content');

      if (!slug) {
        contentEl.innerHTML = '<div class="state-not-found"><p>No state specified. To test locally, add <strong>?state=maharashtra</strong> to your URL.</p><br><a href="/library/holiday-calendar/" class="btn">View all states</a></div>';
        return;
      }

      try {
        // Must run on a local server (like Live Server) for fetch to work locally
        const res = await fetch('/library/holiday-calendar/data/holidays.json');
        
        if (!res.ok) {
            throw new Error("Could not find holidays.json");
        }

        const allData = await res.json();
        const stateData = allData[slug];

        if (!stateData) {
          contentEl.innerHTML = '<div class="state-not-found"><p>Holiday list for "' + escapeHtml(slug) + '" was not found in the database.</p><br><a href="/library/holiday-calendar/" class="btn">View all available states</a></div>';
          return;
        }

        const canonicalUrl = 'https://labourcodesadvisor.com/library/holiday-calendar/' + slug + '/';
        const titleText = stateData.state + ' Government Holiday List 2026 | Labour Codes Advisor';
        const descText = 'Official ' + stateData.state + ' Government holiday calendar 2026 — ' + stateData.holidayCount + ' public, regional, and restricted holidays. Free to view, no login required.';

        document.getElementById('page-title').textContent = titleText;
        document.getElementById('page-description').setAttribute('content', descText);
        document.getElementById('page-canonical').setAttribute('href', canonicalUrl);

        contentEl.innerHTML =
          '<div class="page-hero">' +
            '<p class="eyebrow">Library · Holiday Calendar 2026</p>' +
            '<h1 id="state-heading">' + escapeHtml(stateData.state) + ' Holiday List 2026</h1>' +
            '<p>' + stateData.holidayCount + ' official holidays for ' + escapeHtml(stateData.state) + ', including national, regional, and restricted categories.</p>' +
          '</div>' +
          '<div class="filter-row" id="filter-row">' +
            '<button class="filter-btn active" data-filter="all">All (' + stateData.holidayCount + ')</button>' +
            '<button class="filter-btn" data-filter="national">National</button>' +
            '<button class="filter-btn" data-filter="regional">Regional</button>' +
            '<button class="filter-btn" data-filter="restricted">Restricted</button>' +
          '</div>' +
          '<div id="table-container">' + renderTable(stateData.holidays, 'all') + '</div>' +
          '<div class="disclaimer-box">This calendar is for general informational purposes only. Always verify holiday dates with your state government\'s official gazette notification before finalising attendance or payroll decisions.</div>' +
          '<section class="info-section">' +
            '<div style="max-width: 680px; margin: 0 auto;"><h2 style="font-family: \'DM Serif Display\', serif; font-size: 22px; color: var(--ink); margin-bottom: 16px;">Frequently asked questions</h2></div>' +
            '<div class="faq-item"><h3>How many official holidays does ' + escapeHtml(stateData.state) + ' have in 2026?</h3><p>' + escapeHtml(stateData.state) + ' has ' + stateData.holidayCount + ' listed holidays for 2026, including national, regional, and restricted (optional) holidays as notified by the state government.</p></div>' +
            '<div class="faq-item"><h3>Is this holiday calendar free to access?</h3><p>Yes. Labour Codes Advisor provides this ' + escapeHtml(stateData.state) + ' holiday calendar free of charge, with no login or signup required.</p></div>' +
            '<div class="faq-item"><h3>What is the difference between national, regional, and restricted holidays?</h3><p>National holidays (such as Republic Day and Independence Day) are observed across India. Regional holidays are specific to a state and typically mandatory for establishments in that state. Restricted or optional holidays allow employees to choose a limited number from a list, as per company policy.</p></div>' +
          '</section>';

        injectStateSchema(stateData, canonicalUrl);

        document.getElementById('filter-row').addEventListener('click', function (e) {
          const btn = e.target.closest('.filter-btn');
          if (!btn) return;
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById('table-container').innerHTML = renderTable(stateData.holidays, btn.getAttribute('data-filter'));
        });

      } catch (err) {
        console.error(err);
        contentEl.innerHTML = '<div class="state-not-found"><p>Could not load holiday data right now. Please ensure you are running on a local server (like Live Server) and holidays.json exists.</p></div>';
      }
    }

    init();
  </script>

</body>
</html>
